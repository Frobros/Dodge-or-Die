name: Build, and Deploy via GameCI and Butler

on:
  push:
    branches:
      - 'locojoetive/*'
      - 'wildcard/*'
      - 'fabaone/*'
      - 'herrnock/*'
      - 'release/*'
      - development
      - master
  workflow_dispatch:

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  BLENDER_SHORT_VERSION: 4.2
  BLENDER_FULL_VERSION: 4.2.7

jobs:
  checkLicense:
    name: Check for the Unity license ☑️
    runs-on: ubuntu-latest
    steps:
      - name: Fail - No license ☠️
        if: ${{ !startsWith(env.UNITY_LICENSE, '<') }}
        run: exit 1

  cacheBlender:
    name: Cache Blender Binary 📦
    runs-on: ubuntu-latest
    outputs:
      blenderCached: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Blender Archive
        id: cache
        uses: actions/cache@v4
        with:
          path: blender-${{ env.BLENDER_FULL_VERSION }}-linux-x64.tar.xz
          key: blender-${{ env.BLENDER_FULL_VERSION }}

      - name: Download Blender if not cached
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          wget https://download.blender.org/release/Blender${{ env.BLENDER_SHORT_VERSION }}/blender-${{ env.BLENDER_FULL_VERSION }}-linux-x64.tar.xz

      - name: Verify Blender archive exists
        run: |
          if [ ! -f blender-${{ env.BLENDER_FULL_VERSION }}-linux-x64.tar.xz ]; then
            echo "❌ Blender archive missing!"
            exit 1
          fi

      - name: Upload Blender tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: blender-tarball
          path: blender-${{ env.BLENDER_FULL_VERSION }}-linux-x64.tar.xz
          retention-days: 7


  buildWebGL:
    name: Build for WebGL 🖥️ and Deploy to Itch.io 🚀
    runs-on: ubuntu-latest
    needs: [checkLicense, cacheBlender]
    strategy:
      fail-fast: false
    steps:
      - name: 🧹 Free up disk space (pre-clean)
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          docker system prune -af || true
          echo "After cleanup:"
          df -h

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Blender archive artifact
        uses: actions/download-artifact@v4
        with:
          name: blender-tarball
          path: .


      - name: Verify Blender archive presence
        run: ls -lh blender-${{ env.BLENDER_FULL_VERSION }}-linux-x64.tar.xz

      - name: Prepare Docker build context
        run: |
          mkdir -p /tmp/docker-context
          mv blender-${{ env.BLENDER_FULL_VERSION }}-linux-x64.tar.xz /tmp/docker-context/

      - name: 🐳 Build UnityCI image with Blender (clean layers)
        run: |
          docker build \
            --build-arg BLENDER_SHORT_VERSION=${{ env.BLENDER_SHORT_VERSION }} \
            --build-arg BLENDER_FULL_VERSION=${{ env.BLENDER_FULL_VERSION }} \
            -f Dockerfile.unity-blender \
            -t unityci/editor:blender-added \
            /tmp/docker-context
        # Optional: use buildx for better disk efficiency
        env:
          DOCKER_BUILDKIT: 1

      - name: 🏗️ Build Unity project (WebGL)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: 6000.2.10f1
          customImage: 'unityci/editor:blender-added'

      - name: 🧹 Prune Docker (post-clean)
        if: always()
        run: docker system prune -af || true

      - name: 🚀 Install Butler, zip the build and push it to itch.io
        shell: bash
        env:
          BUTLER_GAME_ID: ${{ secrets.BUTLER_GAME_ID }}
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          BUTLER_USER_NAME: ${{ secrets.BUTLER_USER_NAME }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          echo "------------------------------------------------------------------------"
          echo "Download Butler and unzip butler"
          echo "------------------------------------------------------------------------"
          cd ~
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/15.24.0/archive/default
          unzip butler.zip
          chmod +x butler

          echo "------------------------------------------------------------------------"
          echo "Package WebGL build into current-build.zip"
          echo "------------------------------------------------------------------------"
          cd work/$PROJECT_NAME/$PROJECT_NAME/build/WebGL/WebGL
          zip -r ~/current-build.zip .

          echo "------------------------------------------------------------------------"
          echo "Determine target for itch.io deployment based on branch"
          echo "------------------------------------------------------------------------"
          BRANCH=${GITHUB_REF#refs/heads/}
          if [[ "$BRANCH" == locojoetive/* ]]; then SUFFIX="locojoetive"
          elif [[ "$BRANCH" == wildcard/* ]]; then SUFFIX="wildcard"
          elif [[ "$BRANCH" == fabaone/* ]]; then SUFFIX="fabaone"
          elif [[ "$BRANCH" == herrnock/* ]]; then SUFFIX="herrnock"
          elif [[ "$BRANCH" == development ]]; then SUFFIX="development"
          elif [[ "$BRANCH" == release/* ]]; then SUFFIX="release"
          elif [[ "$BRANCH" == master ]]; then SUFFIX=""
          else echo "Branch not matched for deployment rules, exiting."; exit 1; fi

          if [ -n "$SUFFIX" ]; then
            TARGET="$BUTLER_GAME_ID-$SUFFIX:html5"
          else
            TARGET="$BUTLER_GAME_ID:html5"
          fi

          echo "------------------------------------------------------------------------"
          echo "Pushing current build to itch.io to project $BUTLER_USER_NAME/$TARGET"
          echo "------------------------------------------------------------------------"
          ~/butler push ~/current-build.zip $BUTLER_USER_NAME/$TARGET
